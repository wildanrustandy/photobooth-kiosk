<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Energetic Curator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "outline-variant": "#b2a6d5",
                "on-primary-container": "#14007e",
                "on-secondary": "#f7f0ff",
                "surface-container-highest": "#e2d7ff",
                "secondary-fixed-dim": "#cbbaff",
                "surface-container": "#ede4ff",
                "primary-container": "#9795ff",
                "primary-fixed": "#9795ff",
                "surface-container-lowest": "#ffffff",
                "outline": "#7b719c",
                "on-primary-fixed-variant": "#1a0099",
                "secondary-fixed": "#d8caff",
                "inverse-primary": "#8582ff",
                "tertiary-fixed": "#ff8eaf",
                "background": "#faf4ff",
                "on-error": "#ffefef",
                "on-error-container": "#510017",
                "tertiary-fixed-dim": "#ff75a2",
                "primary-dim": "#3d30d4",
                "on-tertiary-fixed": "#380017",
                "error": "#b41340",
                "tertiary-dim": "#971b4e",
                "on-primary-fixed": "#000000",
                "surface": "#faf4ff",
                "on-surface": "#32294f",
                "on-background": "#32294f",
                "error-dim": "#a70138",
                "on-tertiary": "#ffeff1",
                "on-surface-variant": "#5f557f",
                "on-secondary-fixed-variant": "#573da6",
                "surface-variant": "#e2d7ff",
                "secondary": "#6249b2",
                "on-secondary-fixed": "#3a1b88",
                "surface-dim": "#dacdff",
                "surface-container-high": "#e8deff",
                "on-tertiary-container": "#66002f",
                "secondary-dim": "#563ca5",
                "tertiary": "#a7295a",
                "tertiary-container": "#ff8eaf",
                "primary-fixed-dim": "#8885ff",
                "surface-tint": "#4a40e0",
                "secondary-container": "#d8caff",
                "on-secondary-container": "#4e339c",
                "surface-container-low": "#f5eeff",
                "on-primary": "#f4f1ff",
                "inverse-on-surface": "#a296c4",
                "surface-bright": "#faf4ff",
                "primary": "#4a40e0",
                "error-container": "#f74b6d",
                "on-tertiary-fixed-variant": "#760038",
                "inverse-surface": "#10062d"
              },
              fontFamily: {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Plus Jakarta Sans"],
                "label": ["Plus Jakarta Sans"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-pattern {
            background-color: #faf4ff;
            background-image:
                radial-gradient(at 0% 0%, #e2d7ff 0px, transparent 50%),
                radial-gradient(at 100% 0%, #ff8eaf15 0px, transparent 50%),
                radial-gradient(at 100% 100%, #9795ff20 0px, transparent 50%),
                radial-gradient(at 0% 100%, #ede4ff 0px, transparent 50%);
        }
        .editorial-shadow {
            shadow: 0 8px 32px 0 rgba(87, 61, 166, 0.06);
        }
    </style>
</head>
<body class="bg-pattern font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 antialiased">
<!-- Login Container -->
<main class="w-full max-w-[480px] flex flex-col gap-8">
<!-- Identity Section -->
<header class="flex flex-col items-center text-center space-y-4">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-dim rounded-2xl flex items-center justify-center shadow-lg transform -rotate-3 hover:rotate-0 transition-transform duration-500">
<span class="material-symbols-outlined text-white text-4xl" data-icon="photo_camera">photo_camera</span>
</div>
<div class="space-y-1">
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface font-headline leading-tight">Admin Portal</h1>
<p class="text-on-surface-variant text-sm font-medium tracking-wide">Photobooth Management System</p>
</div>
</header>
<!-- Login Card -->
<section class="bg-surface-container-lowest rounded-[2rem] p-10 editorial-shadow border border-white/40 backdrop-blur-sm relative overflow-hidden">
<!-- Asymmetric Accent -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-tertiary/5 rounded-full blur-3xl"></div>
<form action="#" class="space-y-6 relative z-10">
<!-- Username/Email -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="identifier">Username / Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-on-surface placeholder:text-outline-variant font-medium" id="identifier" placeholder="admin@studio.com" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-on-surface placeholder:text-outline-variant font-medium" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Utilities -->
<div class="flex items-center justify-between px-1">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer appearance-none w-5 h-5 rounded-md border-2 border-outline-variant checked:bg-primary checked:border-primary transition-all cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[16px] left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none" data-icon="check">check</span>
</div>
<span class="text-sm font-semibold text-on-surface-variant group-hover:text-on-surface transition-colors">Keep me signed in</span>
</label>
<a class="text-sm font-bold text-primary hover:text-primary-dim transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-dim hover:from-primary-dim hover:to-primary text-white py-4 rounded-xl font-extrabold text-lg flex items-center justify-center gap-3 shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-200" type="submit">
                    Masuk
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</section>
<!-- Secondary Action (Pink Accent) -->
<div class="text-center">
<p class="text-sm text-on-surface-variant font-medium">
                Not an admin?
                <a class="text-tertiary font-bold hover:underline underline-offset-4 ml-1" href="#">Staff Access</a>
</p>
</div>
<!-- Footer Links -->
<footer class="mt-8">
<nav class="flex flex-wrap items-center justify-center gap-x-8 gap-y-2">
<a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
</nav>
<p class="text-center text-[10px] mt-8 text-outline font-medium tracking-tight">
                © 2024 Energetic Curator Studio. All rights reserved. Professional Photobooth Management v4.2.0
            </p>
</footer>
</main>
<!-- Background Decorative Elements -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<!-- Geometric Shapes -->
<div class="absolute top-20 left-[10%] w-64 h-64 border-[32px] border-surface-container-highest rounded-full opacity-30"></div>
<div class="absolute bottom-20 right-[5%] w-96 h-96 border-[48px] border-primary-container/20 rounded-[4rem] rotate-12 opacity-20"></div>
<div class="absolute top-1/2 right-[15%] w-12 h-12 bg-tertiary-container/30 rounded-xl rotate-45"></div>
<div class="absolute bottom-1/3 left-[8%] w-8 h-8 bg-secondary-container/40 rounded-full"></div>
</div>
</body></html>
